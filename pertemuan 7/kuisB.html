<!DOCTYPE html>
<html>
<head>
    <title>PWeb-07.3. Kuis Javascript Dasar</title>
</head>
<body>

<script>
    var a = 12;
    var b = 4;

    function PerkalianDengan2 (b){
        a = b * 2;
        return a;
    }
    document.write("Dua kali dari " + b + " adalah " + PerkalianDengan2(b));
    document.write("<br> Nilai dari a adalah " + a);
</script>

</body>
</html>
